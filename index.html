<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พิเศษสำหรับ ลูกพีช 🍑💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E2DFEB; /* พื้นหลังม่วงอ่อนเดิม */
            --ticket-pink: #FFDDE2;
            --ticket-blue: #D0EFFF;
            --ticket-orange: #FFDBC2;
            --text-dark: #333;
            --border-dark: #222;
            --heart-red: #FF6B6B;
        }

        body {
            margin: 0; padding: 0; font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color); overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* ----- หน้าแรก: มือถือบัตรที่พับไว้ ----- */
        #intro-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; z-index: 100;
            text-align: center; width: 100%; height: 100%;
            position: absolute;
        }

        .folded-card-container {
            position: relative;
            animation: bounce 2s infinite;
        }

        .folded-card {
            width: 200px; height: 130px;
            background: linear-gradient(135deg, var(--ticket-pink), var(--ticket-blue));
            border: 3px solid var(--border-dark); border-radius: 10px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            transform: rotate(-5deg);
        }

        .thumb-front {
            position: absolute; bottom: -10px; right: -25px;
            width: 80px; height: 100px;
            background-color: #FFF2E6; border: 3px solid var(--border-dark);
            border-radius: 40px 30px 20px 50px;
            transform: rotate(-10deg); z-index: 2;
        }

        .intro-text-box {
            background-color: #fff; border: 2px solid var(--border-dark);
            border-radius: 20px; padding: 10px 20px;
            margin-top: 50px; font-weight: 500;
            box-shadow: 2px 2px 0 var(--border-dark);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ----- หน้าหลัก: มือถือตั๋ว ----- */
        #main-screen {
            display: none; position: relative; width: 100%; height: 100%;
            justify-content: center; align-items: center;
        }

        /* คอนเทนเนอร์มือและแขน */
        .hand-container {
            position: absolute; bottom: 0; right: 0;
            display: flex; flex-direction: column; align-items: center;
            z-index: 2;
        }

        .sleeve {
            width: 90px; height: 150px;
            background-color: #fff; /* สีเสื้อ */
            border: 3px solid var(--border-dark); border-bottom: none;
            border-radius: 30px 30px 0 0;
            box-shadow: -2px -2px 0 var(--border-dark);
        }

        .thumb {
            width: 90px; height: 110px;
            background-color: #FFF2E6; border: 3px solid var(--border-dark);
            border-radius: 40px 30px 20px 50px;
            position: relative; top: -10px; left: -10px; /* ขยับนิ้วโป้ง */
            transform: rotate(-10deg);
            z-index: 3;
        }

        /* ตัวตั๋ว */
        .ticket-container {
            position: relative;
            transform: rotate(-5deg); /* เอียงการ์ดเล็กน้อย */
            z-index: 10;
        }

        .ticket {
            background: linear-gradient(to bottom, var(--ticket-blue), #fff 50%, var(--ticket-orange));
            border: 3px solid var(--border-dark); border-radius: 15px;
            width: 300px; padding: 30px 30px 50px 30px;
            text-align: center; box-shadow: 3px 3px 0px rgba(0,0,0,0.15);
            position: relative;
        }

        /* รอยปรุตั๋ว */
        .ticket::after {
            content: ''; position: absolute; left: 0; right: 0; bottom: 40px;
            height: 3px; background: repeating-linear-gradient(90deg, transparent, transparent 5px, var(--border-dark) 5px, var(--border-dark) 10px);
        }

        /* ตกแต่งตั๋ว */
        .ticket-header {
            font-size: 1.6rem; font-weight: 700; color: var(--border-dark);
            background-color: #fff; padding: 5px 10px; border: 2px solid var(--border-dark);
            border-radius: 8px; transform: rotate(-2deg); display: inline-block;
            margin-bottom: 15px; text-transform: uppercase;
        }

        .to-peach {
            background-color: var(--ticket-pink); border: 2px dashed var(--border-dark);
            border-radius: 10px; padding: 10px; margin-bottom: 20px; font-weight: 500;
        }

        .ticket-body-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 25px; color: var(--text-dark); }
        .ticket-id { font-size: 0.8rem; color: #777; font-family: monospace; position: absolute; top: 10px; left: 15px; }

        /* ส่วนของหัวใจ (Hearts instead of Checkboxes) */
        .heart-group { display: flex; justify-content: space-around; margin-top: 35px; }
        .heart-label {
            display: flex; flex-direction: column; align-items: center;
            font-size: 1.4rem; font-weight: 500; cursor: pointer; color: var(--border-dark);
        }

        .heart-label input[type="checkbox"] { display: none; } /* ซ่อนติ๊กถูก */

        .heart-icon {
            font-size: 3rem; color: #fff; /* สีเริ่มต้นของหัวใจ (โปร่ง) */
            transition: transform 0.2s;
            filter: drop-shadow(2px 2px 0 var(--border-dark));
        }

        /* ตอนติ๊ก: ทำให้หัวใจเต็มสี */
        .heart-label input[type="checkbox"]:checked + .heart-icon {
            color: var(--heart-red);
            transform: scale(1.1);
        }

        /* พื้นหลัง: ชื่อลูกพีชลอย */
        #floating-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .floating-name { position: absolute; font-size: 1.5rem; color: #FF6B6B; font-weight: 500; white-space: nowrap; opacity: 0; animation: floatUp ease-in forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 1; } 100% { transform: translateY(-20vh) scale(1.2); opacity: 0; } }

        /* ----- หน้าแจ้งเตือนตกลง (Sticker Design) ----- */
        #success-message {
            display: none; position: absolute; top: 50px; left: 50%;
            transform: translateX(-50%); background-color: var(--heart-red);
            color: #fff; padding: 25px 35px; border-radius: 20px;
            border: 4px solid var(--border-dark);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.15); z-index: 1000;
            text-align: center; animation: stickerIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 85%; max-width: 350px;
        }

        #success-message::before { /* ตกแต่งวงกลมสติกเกอร์ */
            content: ''; position: absolute; top: -15px; left: -15px;
            width: 30px; height: 30px; background-color: #fff; border: 3px solid var(--border-dark); border-radius: 50%;
        }

        #success-message h2 { margin: 0 0 10px 0; font-size: 2rem; font-weight: 700; text-transform: uppercase; }
        #success-message p { margin: 0; font-size: 1.3rem; line-height: 1.5; font-weight: 500; }

        @keyframes stickerIn {
            0% { transform: translateX(-50%) translateY(-20px) scale(0.5); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="song.mp3"></audio>

    <div id="intro-screen" onclick="openCard()">
        <div class="folded-card-container">
            <div class="folded-card"></div>
            <div class="thumb-front"></div>
        </div>
        <div class="intro-text-box">
            มีบัตรเชิญส่งถึง ลูกพีช 🍑<br>
            แตะเพื่อเปิดอ่าน 💌
        </div>
    </div>

    <div id="main-screen">
        <div id="floating-container"></div>
        
        <div id="success-message">
            <h2>เย้! 💖</h2>
            <p>เป็นแฟนกันแล้วนะ ลูกพีช 🍑💖<br>เค้าดีใจที่สุดเลย รักนะ</p>
        </div>
        
        <div class="hand-container">
            <div class="thumb"></div>
            <div class="sleeve"></div>
        </div>

        <div class="ticket-container">
            <div class="ticket">
                <div class="ticket-id">LOVE-01-PF</div>
                <div class="ticket-header">Special Ticket</div>
                <div class="to-peach">
                    <strong>ถึง: ลูกพีช 🍑 (คนเก่งของเค้า)</strong>
                </div>
                <div class="ticket-body-text">
                    รู้ว่าอาจจะมีงี่เง่าบ้าง...<br>
                    แต่รักเธอที่สุดเลยนะ...<br>
                    ตกลงยอมรับบัตรใบนี้ไหมคะ/ครับ?
                </div>
                
                <div class="heart-group">
                    <label class="heart-label">
                        <input type="checkbox" onchange="handleAccept(this)">
                        <span class="heart-icon">🤍</span>
                        <strong>ได้</strong>
                    </label>
                    <label class="heart-label">
                        <input type="checkbox" onchange="handleAccept(this)">
                        <span class="heart-icon">🤍</span>
                        <strong>ได้</strong>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openCard() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }

        // ฟังก์ชันเมื่อลูกพีชกด "ได้"
        function handleAccept(checkbox) {
            if (checkbox.checked) {
                // 1. เล่นเพลง
                const music = document.getElementById('bg-music');
                music.play().catch(e => console.log("เบราว์เซอร์อาจบล็อกการเล่นเสียงออโต้", e));

                // 2. โชว์ข้อความพิเศษ (สติกเกอร์)
                document.getElementById('success-message').style.display = 'block';

                // 3. เอฟเฟกต์ชื่อลูกพีชลอยขึ้นมา
                const container = document.getElementById('floating-container');
                for (let i = 0; i < 40; i++) {
                    setTimeout(() => {
                        const floatingElement = document.createElement('div');
                        floatingElement.classList.add('floating-name');
                        floatingElement.innerText = 'ลูกพีช 🍑💖';
                        floatingElement.style.left = Math.random() * 90 + 'vw';
                        floatingElement.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                        const duration = Math.random() * 3 + 2;
                        floatingElement.style.animationDuration = duration + 's';
                        
                        container.appendChild(floatingElement);
                        setTimeout(() => floatingElement.remove(), duration * 1000);
                    }, i * 150);
                }
            }
        }
    </script>

</body>
</html>
